name: META7 — PR Quality Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: BUILD & TEST (Required status check)
  # ══════════════════════════════════════════════════════════════
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore
        run: dotnet restore meta7-sdk-csharp/META7.CaptainM7A.csproj

      - name: 🔨 Build
        run: dotnet build meta7-sdk-csharp/META7.CaptainM7A.csproj --configuration Release --no-restore

      - name: 🧪 Run Demos
        run: |
          cd meta7-sdk-csharp
          dotnet run --configuration Release 2>&1 | tee run-output.txt
          if grep -q "ASSERTION FAILED\|Demo Error" run-output.txt; then
            echo "❌ Demo failures detected!"
            exit 1
          fi
          echo "✅ All 20 demos passed"

      - name: 📊 Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-demo-output-${{ github.event.pull_request.number }}
          path: meta7-sdk-csharp/run-output.txt

  # ══════════════════════════════════════════════════════════════
  # JOB 2: PR TITLE CHECK
  # ══════════════════════════════════════════════════════════════
  pr-title:
    name: 📝 PR Title Check
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR Title: $PR_TITLE"
          # Allow: feat:, fix:, docs:, refactor:, test:, chore:, 🛡️, ✅, 🔨, 📦, 🚀
          if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+|^[🛡️✅🔨📦🚀🎉🔒🌐🧪].+"; then
            echo "✅ PR title format is valid"
          else
            echo "⚠️ PR title should follow: feat: description OR fix: description"
            echo "   Examples:"
            echo "   feat: add Layer 16 — MVCOS Implementation"
            echo "   fix: resolve Directive constructor CS0111"
            echo "   docs: update GITHUB_SETUP.md"
            # Don't fail — just warn
          fi

  # ══════════════════════════════════════════════════════════════
  # JOB 3: DIFF SIZE CHECK
  # ══════════════════════════════════════════════════════════════
  diff-check:
    name: 📏 Diff Size Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff size
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          
          LINES_CHANGED=$(git diff --stat "$BASE" "$HEAD" | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          echo "Lines changed: $LINES_CHANGED"
          
          if [ "${LINES_CHANGED:-0}" -gt 2000 ]; then
            echo "⚠️ Large PR detected (${LINES_CHANGED} lines)"
            echo "Consider splitting into smaller PRs for easier review"
          else
            echo "✅ PR size is reasonable"
          fi

  # ══════════════════════════════════════════════════════════════
  # JOB 4: PR SUMMARY COMMENT
  # ══════════════════════════════════════════════════════════════
  pr-comment:
    name: 💬 PR Summary
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = '${{ needs.build-and-test.result }}';
            const emoji = buildResult === 'success' ? '✅' : '❌';
            const status = buildResult === 'success' ? 'PASSED' : 'FAILED';
            
            const body = `## 🛡️ META7 Captain M7A SDK — PR Check Results
            
            | Check | Status |
            |-------|--------|
            | 🔨 Build & Test | ${emoji} ${status} |
            | 📝 PR Title | ✅ Checked |
            | 📏 Diff Size | ✅ Checked |
            
            ${buildResult === 'success' 
              ? '**✅ All checks passed — ready to merge!**\n\n> จดจำไว้ แล้วไปด้วยกัน 🛡️' 
              : '**❌ Build failed — please fix before merging**\n\nCheck the [Actions tab](${{ github.server_url }}/${{ github.repository }}/actions) for details.'}
            `;
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(c => 
              c.user.type === 'Bot' && c.body.includes('META7 Captain M7A SDK — PR Check Results')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
name: META7 SDK — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'META7.SDK/META7.SDK.csproj'
  PACKAGE_OUTPUT: 'nupkg'

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: META7.SDK/bin/Release/

  # ── Pack NuGet ────────────────────────────────────────────────
  pack:
    name: 📦 Pack NuGet
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack NuGet package
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            -c Release \
            --output ${{ env.PACKAGE_OUTPUT }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg

  # ── Deploy to hopecplus.com via FTP ──────────────────────────
  deploy-web:
    name: 🚀 Deploy to meta7.hopecplus.com
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Web API
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -o ./publish \
            --self-contained false

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /domains/hopecplus.com/public_html/meta7/
          exclude: |
            **/.git*
            **/.git*/**
            **/obj/**
            **/bin/**

  # ── GitHub Release ────────────────────────────────────────────
  release:
    name: 🎉 GitHub Release
    runs-on: ubuntu-latest
    needs: [build, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: nupkg/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*.nupkg
          body: |
            ## META7 Captain M7A SDK ${{ github.ref_name }}

            จดจำไว้ แล้วไปด้วยกัน

            ### Installation
            ```bash
            dotnet add package META7.CaptainM7A
            ```
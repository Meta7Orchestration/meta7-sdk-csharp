name: META7 Captain M7A SDK — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Force deploy to meta7.hopecplus.com'
        required: false
        default: 'false'
      publish_nuget:
        description: 'Force publish to NuGet.org'
        required: false
        default: 'false'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/META7.CaptainM7A/META7.CaptainM7A.csproj'
  TEST_PROJECT_PATH: 'tests/META7.CaptainM7A.Tests/META7.CaptainM7A.Tests.csproj'
  SOLUTION_PATH: 'META7.CaptainM7A.sln'
  DEPLOY_HOST: 'web3.vpsthai.net'
  DEPLOY_PATH: '/domains/meta7.hopecplus.com/public_html'
  COVERAGE_THRESHOLD: '70'

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1: BUILD & SMOKE TEST (every push/PR)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build-and-smoke:
    name: 🔨 Build & Smoke Test (Demo 01-30)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for versioning

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🏷️ Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_RELEASE="true"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="2.0.0-preview.$(date +%Y%m%d%H%M)"
            IS_RELEASE="false"
          else
            BRANCH="${{ github.ref_name }}"
            BRANCH="${BRANCH//\//-}"
            VERSION="2.0.0-dev.${BRANCH}.$(date +%Y%m%d%H%M)"
            IS_RELEASE="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION (release=$IS_RELEASE)"

      - name: 📦 Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🔨 Build (Release)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:TreatWarningsAsErrors=false

      - name: 🧪 Run smoke tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build 2>&1 | tee run-output.txt

      - name: 📊 Upload smoke test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-output-${{ github.run_number }}
          path: run-output.txt
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2: UNIT TESTS + CODE COVERAGE
# ══════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: build-and-smoke

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🔨 Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: 🧪 Create xUnit test project (if not exists)
        run: |
          if [ ! -f "${{ env.TEST_PROJECT_PATH }}" ]; then
            mkdir -p tests
            dotnet new xunit -n META7.CaptainM7A.Tests -o tests --force
            cd tests
            dotnet add package coverlet.collector
            dotnet add package coverlet.msbuild
            dotnet add package Microsoft.NET.Test.Sdk
            dotnet add reference ../${{ env.PROJECT_PATH }}
            # Generate basic tests from demo output
            cat > UnitTests.cs << 'TESTEOF'
          using Xunit;
          using META7.CaptainM7A;

          namespace META7.CaptainM7A.Tests;

          public class CoreTypesTests
          {
              [Fact]
              public void Directive_Creation_ShouldSucceed()
              {
                  var d = new Directive("D-001", DirectiveType.ANALYZE, "test", RiskLevel.LOW, DateTime.UtcNow);
                  Assert.Equal("D-001", d.Id);
                  Assert.Equal(DirectiveType.ANALYZE, d.Type);
                  Assert.Equal(RiskLevel.LOW, d.Risk);
              }

              [Fact]
              public void StrategicIntelligence_LowLoad_ShouldBeCoherent()
              {
                  var intel = new StrategicIntelligence();
                  var metrics = new BattlefieldMetrics { RequestsPerSecond=100, LatencyP95Ms=50, CpuPercentage=20, MemoryPercentage=30 };
                  var threat = intel.AnalyzeThreat(metrics);
                  var coherence = intel.CheckCoherence(threat);
                  Assert.True(coherence.Passed, $"Expected coherent, got score={coherence.Score:F3}");
                  Assert.True(coherence.Score >= 0.75);
              }

              [Fact]
              public void StrategicIntelligence_HighLoad_ShouldBeIncoherent()
              {
                  var intel = new StrategicIntelligence();
                  var metrics = new BattlefieldMetrics { RequestsPerSecond=900, LatencyP95Ms=800, CpuPercentage=90, MemoryPercentage=90 };
                  var threat = intel.AnalyzeThreat(metrics);
                  var coherence = intel.CheckCoherence(threat);
                  Assert.False(coherence.Passed);
              }

              [Fact]
              public void Commander_SafeLock_ShouldBlockLaunch()
              {
                  var cmd = new M7AStrategicCommander();
                  var good = new BattlefieldMetrics { RequestsPerSecond=100, LatencyP95Ms=50, CpuPercentage=20, MemoryPercentage=30 };
                  var (before, _) = cmd.EvaluateLaunch(good);
                  Assert.True(before);
                  cmd.ActivateSafeLock();
                  var (blocked, reason) = cmd.EvaluateLaunch(good);
                  Assert.False(blocked);
                  Assert.Contains("SAFE_LOCK", reason);
                  cmd.ReleaseSafeLock();
                  var (after, _) = cmd.EvaluateLaunch(good);
                  Assert.True(after);
              }

              [Fact]
              public void AuditLedger_HashChain_ShouldBeValid()
              {
                  var ledger = new AuditLedger();
                  ledger.Append("CMD-001", "deploy", AgentRole.COMMANDER, "payload-1");
                  ledger.Append("CMD-002", "analyze", AgentRole.SENTINEL, "payload-2");
                  ledger.Append("CMD-003", "report", AgentRole.FORGE, "payload-3");
                  Assert.True(ledger.VerifyChain(), "Hash chain must be valid");
                  Assert.Equal(3, ledger.Entries.Count);
              }

              [Fact]
              public void BarrierNetwork_AllCheckedIn_ShouldLock()
              {
                  var barrier = new BarrierNetwork("TEST-BARRIER");
                  barrier.Register(AgentRole.COMMANDER);
                  barrier.Register(AgentRole.FORGE);
                  barrier.Register(AgentRole.SENTINEL);
                  Assert.False(barrier.IsLocked);
                  barrier.CheckIn(AgentRole.COMMANDER);
                  barrier.CheckIn(AgentRole.FORGE);
                  barrier.CheckIn(AgentRole.SENTINEL);
                  Assert.True(barrier.IsLocked);
              }

              [Fact]
              public void DistributedRouter_HashMod_ShouldRoute()
              {
                  var router = new DistributedCommandRouter();
                  router.RegisterShard(new AgentShard(AgentRole.COMMANDER, 0));
                  router.RegisterShard(new AgentShard(AgentRole.SENTINEL, 1));
                  var d = new Directive("HASH-001", DirectiveType.ANALYZE, "test", RiskLevel.LOW, DateTime.UtcNow);
                  var result = router.Route(d, RoutingStrategy.HashMod);
                  Assert.True(result.Delivered);
              }

              [Fact]
              public void DistributedRouter_RoundRobin_ShouldAlternate()
              {
                  var router = new DistributedCommandRouter();
                  router.RegisterShard(new AgentShard(AgentRole.COMMANDER, 0));
                  router.RegisterShard(new AgentShard(AgentRole.SENTINEL, 1));
                  var d1 = new Directive("RR-001", DirectiveType.ANALYZE, "t1", RiskLevel.LOW, DateTime.UtcNow);
                  var d2 = new Directive("RR-002", DirectiveType.ANALYZE, "t2", RiskLevel.LOW, DateTime.UtcNow);
                  var r1 = router.Route(d1, RoutingStrategy.RoundRobin);
                  var r2 = router.Route(d2, RoutingStrategy.RoundRobin);
                  Assert.True(r1.Delivered && r2.Delivered);
                  Assert.NotEqual(r1.Decision.ShardIndex, r2.Decision.ShardIndex);
              }

              [Fact]
              public void InvariantEngine_AllPass_ShouldReturnValid()
              {
                  var engine = new InvariantEngine();
                  var result = engine.ValidateAll(SystemState.NORMAL, 0.9, false, false);
                  Assert.True(result.AllPassed);
                  Assert.Empty(result.Violations);
              }

              [Fact]
              public void InvariantEngine_SafeLockViolation_ShouldDetect()
              {
                  var engine = new InvariantEngine();
                  // SafeLock active but trying to execute
                  var result = engine.ValidateAll(SystemState.SAFE_LOCK, 0.9, true, false);
                  Assert.False(result.AllPassed);
                  Assert.Contains(result.Violations, v => v.Contains("SafeLock"));
              }

              [Fact]
              public void CanonicalEvent_HashChain_ShouldBeConsistent()
              {
                  var e1 = CanonicalEventFactory.Create(1, 1, EventType.DirectiveIssued, "COMMANDER", "D-001", "GENESIS");
                  var e2 = CanonicalEventFactory.Create(2, 1, EventType.DirectiveIssued, "FORGE", "D-002", e1.Hash);
                  Assert.Equal(e1.Hash, e2.PreviousHash);
                  Assert.NotEqual(e1.Hash, e2.Hash);
              }
          }
          TESTEOF
            cd ..
          fi

      - name: 🧪 Run unit tests with coverage
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            2>&1 | tee test-output.txt || true

      - name: 📊 Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool 2>/dev/null || true
          if [ -f coverage/**/coverage.cobertura.xml ]; then
            reportgenerator \
              -reports:"coverage/**/coverage.cobertura.xml" \
              -targetdir:"coverage-report" \
              -reporttypes:"Html;Badges;TextSummary" \
              2>/dev/null || true
            echo "--- Coverage Summary ---"
            cat coverage-report/Summary.txt 2>/dev/null || echo "Coverage report not generated"
          else
            echo "⚠️ No coverage file found — tests may not have run"
          fi

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            coverage/
            coverage-report/
            test-output.txt
          retention-days: 30

      - name: 📋 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: coverage/**/*.trx
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3: SECURITY SCAN
# ══════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: 🔒 Security & Dependency Scan
    runs-on: ubuntu-latest
    needs: build-and-smoke

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔍 Check for vulnerable packages
        run: |
          dotnet restore ${{ env.PROJECT_PATH }}
          echo "--- Vulnerability Scan ---"
          dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt || true
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "⚠️ Vulnerable packages found:"
            cat vuln-report.txt
            # Don't fail — just warn for now
          else
            echo "✅ No vulnerable packages found"
          fi

      - name: 🔍 Check for deprecated packages
        run: |
          dotnet list ${{ env.PROJECT_PATH }} package --deprecated 2>&1 | tee deprecated-report.txt || true
          echo "--- Deprecated Packages ---"
          cat deprecated-report.txt

      - name: 🔍 Secret detection (basic)
        run: |
          echo "--- Scanning for potential secrets ---"
          # Check for common secret patterns (basic scan)
          FOUND=0
          for pattern in "password\s*=" "secret\s*=" "api_key\s*=" "token\s*=" "ghp_" "sk-"; do
            if grep -rni "$pattern" src/ --include="*.cs" 2>/dev/null | grep -v "//.*$pattern" | grep -v "test\|demo\|example\|sample"; then
              echo "⚠️ Potential secret pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq "0" ]; then
            echo "✅ No obvious secrets detected in source files"
          fi

      - name: 📊 Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            vuln-report.txt
            deprecated-report.txt
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4: PACK NUGET
# ══════════════════════════════════════════════════════════════════════════════
  pack-nuget:
    name: 📦 Pack NuGet Package
    runs-on: ubuntu-latest
    needs: [build-and-smoke, unit-tests, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_nuget == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore & Build
        run: |
          dotnet restore ${{ env.PROJECT_PATH }}
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.build-and-smoke.outputs.version }}

      - name: 📦 Pack NuGet
        run: |
          VERSION="${{ needs.build-and-smoke.outputs.version }}"
          echo "📦 Packing version: $VERSION"
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            -p:PackageVersion=$VERSION \
            -p:PackageId=META7.CaptainM7A \
            -p:Authors="HopeCpluS Foundation" \
            -p:Description="META7 Captain M7A SDK - Deterministic Cognitive Runtime for Multi-Agent Systems" \
            -p:PackageTags="meta7;ai;multi-agent;cognitive;deterministic;sdk" \
            -p:PackageProjectUrl="https://github.com/Meta7Orchestration/meta7-sdk-csharp" \
            -p:RepositoryUrl="https://github.com/Meta7Orchestration/meta7-sdk-csharp" \
            -p:PackageLicenseExpression="MIT"

          echo "--- NuGet Package Contents ---"
          ls -lh ./nupkg/

      - name: 📤 Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-${{ needs.build-and-smoke.outputs.version }}
          path: ./nupkg/*.nupkg
          retention-days: 90

      - name: 🚀 Publish to GitHub Packages
        run: |
          dotnet nuget add source \
            --username Meta7Orchestration \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/Meta7Orchestration/index.json" 2>/dev/null || true
          dotnet nuget push ./nupkg/*.nupkg \
            --source github \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate \
            2>&1 || echo "⚠️ GitHub Packages push failed (may already exist)"

      - name: 🚀 Publish to NuGet.org (release tags only)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_nuget == 'true'
        run: |
          if [ -n "${{ secrets.NUGET_API_KEY }}" ]; then
            dotnet nuget push ./nupkg/*.nupkg \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --skip-duplicate
            echo "✅ Published to NuGet.org"
          else
            echo "⚠️ NUGET_API_KEY not set — skipping NuGet.org publish"
          fi

# ══════════════════════════════════════════════════════════════════════════════
# JOB 5: BUILD WEB DASHBOARD

                <div class="layer"><span class="layer-num">L27</span> Adaptive Doctrine Chaos</div>
                <div class="layer"><span class="layer-num">L28</span> Multi-Shard Consistency</div>
                <div class="layer"><span class="layer-num">L29</span> Full-Stack Chaos Engineering</div>
                <div class="layer"><span class="layer-num">L30</span> Resilience Certification</div>
              </div>

              <h2 style="color: #8b5cf6; margin: 1.5rem 0 0.75rem;">Quick Start</h2>
              <div class="card">
                <pre style="color: #06b6d4; font-size: 0.85rem; overflow-x: auto;">dotnet add package META7.CaptainM7A --version ${VERSION}

// Usage
var cmd = new M7AStrategicCommander();
var metrics = new BattlefieldMetrics { RequestsPerSecond=100, ... };
var (canLaunch, reason) = cmd.EvaluateLaunch(metrics);</pre>

# ══════════════════════════════════════════════════════════════════════════════
# JOB 6: DEPLOY TO meta7.hopecplus.com
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to meta7.hopecplus.com
    runs-on: ubuntu-latest
    needs: [build-and-smoke, unit-tests, build-web]
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    environment:
      name: production
      url: https://meta7.hopecplus.com

    steps:
      - name: 📥 Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package-${{ github.run_number }}
          path: ./deploy-package

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-package/
          server-dir: /domains/meta7.hopecplus.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
            **/.DS_Store

      - name: ✅ Verify deployment
        run: |
          echo "⏳ Waiting for deployment to propagate..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://meta7.hopecplus.com" 2>/dev/null || echo "000")
          echo "HTTP Status: $STATUS"
          if [[ "$STATUS" =~ ^(200|301|302|304)$ ]]; then
            echo "✅ Deployment verified — meta7.hopecplus.com is live"
          else
            echo "⚠️ Status $STATUS — may still be propagating (not failing build)"
          fi

      - name: 📊 Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://meta7.hopecplus.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.build-and-smoke.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY

# ══════════════════════════════════════════════════════════════════════════════
# JOB 7: GITHUB RELEASE (on tag)
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pack-nuget, deploy]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package-${{ needs.build-and-smoke.outputs.version }}
          path: ./nupkg

      - name: 📥 Download smoke test output
        uses: actions/download-artifact@v4
        with:
          name: smoke-test-output-${{ github.run_number }}
          path: ./artifacts

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./nupkg/*.nupkg
            ./artifacts/run-output.txt
          generate_release_notes: true
          body: |
            ## 🛡️ META7 Captain M7A SDK ${{ github.ref_name }}

            > จดจำไว้ แล้วไปด้วยกัน

            ### ✅ Quality Gates Passed
            - 🧪 **30/30 Demos** — all passing
            - 🔒 **Security scan** — no vulnerabilities
            - 📦 **NuGet package** — published to GitHub Packages

            ### 🏗️ Architecture (30 Layers)
            | Layers | Description |
            |--------|-------------|
            | L01-L10 | Core Runtime: Types, Intelligence, Commander, Cognitive Loop, Pipeline, Barrier, Audit, Control Plane, Doctrine, Simulation |
            | L11-L15 | Event System: Canonical Events, Invariants, Meaning Stone, Event Store, Will-Source |
            | L16-L20 | Distribution: Router, Multi-Agent Bus, Circuit Breaker, Fault Tolerance, Adaptive Doctrine |
            | L21-L30 | Stress & Chaos: Load Test, Memory, Chaos, Replay Stress, Deadlock, Storm, Chaos Adaptation, Shard Consistency, Full Chaos, Resilience Cert |

            ### 📦 Installation
            ```bash
            dotnet add package META7.CaptainM7A --version ${{ github.ref_name }}
            ```

            ### 🚀 Quick Start
            ```csharp
            var cmd = new M7AStrategicCommander();
            var metrics = new BattlefieldMetrics {
                RequestsPerSecond = 100,
                LatencyP95Ms = 50,
                CpuPercentage = 20,
                MemoryPercentage = 30
            };
            var (canLaunch, reason) = cmd.EvaluateLaunch(metrics);
            ```

            ### 🔗 Links
            - 🌐 [meta7.hopecplus.com](https://meta7.hopecplus.com)
            - 📦 [GitHub Packages](https://github.com/orgs/Meta7Orchestration/packages)
            - 📖 [Repository](https://github.com/Meta7Orchestration/meta7-sdk-csharp)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-preview') || contains(github.ref_name, '-dev') }}

# ══════════════════════════════════════════════════════════════════════════════
# JOB 8: PIPELINE SUMMARY
# ══════════════════════════════════════════════════════════════════════════════
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-smoke, unit-tests, security-scan, pack-nuget]
    if: always()

    steps:
      - name: 📊 Write summary
        run: |
          echo "## 🛡️ META7 Captain M7A SDK — Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build & Smoke Test | ${{ needs.build-and-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests + Coverage | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Pack NuGet | ${{ needs.pack-nuget.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.build-and-smoke.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> จดจำไว้ แล้วไปด้วยกัน 🎖️" >> $GITHUB_STEP_SUMMARY